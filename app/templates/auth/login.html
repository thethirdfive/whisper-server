{% extends "base.html" %}
{% block title %}登录 / Login - whisper-server{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-20">
    <div class="max-w-sm w-full bg-white rounded-xl shadow-md p-8">
        <div class="text-center mb-7">
            <div class="flex justify-center mb-3 glow-cyan">
                <svg class="logo-wave" width="58" height="58" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs><linearGradient id="wgrad2" x1="6" y1="6" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs>
                    <rect x="2.5" y="2.5" width="35" height="35" rx="11" fill="url(#wgrad2)" fill-opacity="0.12" stroke="url(#wgrad2)" stroke-opacity="0.5" stroke-width="1.4"/>
                    <g fill="url(#wgrad2)">
                        <rect x="9" y="17" width="3" height="6" rx="1.5"/>
                        <rect x="14.5" y="13" width="3" height="14" rx="1.5"/>
                        <rect x="20" y="8" width="3" height="24" rx="1.5"/>
                        <rect x="25.5" y="14" width="3" height="12" rx="1.5"/>
                        <rect x="31" y="18" width="3" height="4" rx="1.5"/>
                    </g>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight"><span class="text-gradient">whisper</span></h1>
            <p class="text-sm text-slate-500 mt-1.5">私人会议转录系统 · 本地 GPU · 端到端可检索</p>
        </div>

        {% if error == "invalid" %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded">
            用户名或密码错误 / Invalid credentials
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    用户名 / Username
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    autocomplete="username"
                    autofocus
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    密码 / Password
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium
                       py-2 px-4 rounded-md text-sm transition-colors"
            >
                登录 / Sign in
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            管理员账号由 .env 的 ADMIN_* 初始化
        </p>
    </div>
</div>
{% endblock %}
