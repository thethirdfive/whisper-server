{% extends "base.html" %}
{% block title %}登录 / Login - whisper-server{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-20">
    <div class="max-w-sm w-full bg-white rounded-xl shadow-md p-8">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🎙</div>
            <h1 class="text-xl font-bold">whisper-server</h1>
            <p class="text-sm text-slate-500 mt-1">私人会议转录系统</p>
        </div>

        {% if error == "invalid" %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded">
            用户名或密码错误 / Invalid credentials
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    用户名 / Username
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    autocomplete="username"
                    autofocus
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    密码 / Password
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium
                       py-2 px-4 rounded-md text-sm transition-colors"
            >
                登录 / Sign in
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            管理员账号由 .env 的 ADMIN_* 初始化
        </p>
    </div>
</div>
{% endblock %}
